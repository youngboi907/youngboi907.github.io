<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PULSE · Crypto MTF Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root{
  --bg:#100a1f;--bg2:#1b1430;--panel:#1d1733;--panel2:#27213f;--line:rgba(255,255,255,0.08);
  --txt:#f4eeff;--muted:#a99ec9;--dim:#6a5f8c;
  --acc:#1FC7D4;--acc2:#7645D9;--up:#31D0AA;--dn:#ED5B7D;--gold:#FFB237;--pink:#ED4B9E;
  --r:20px;--font:'Kanit',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:#26304a transparent}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#222b40;border-radius:8px;border:2px solid transparent;background-clip:padding-box}::-webkit-scrollbar-thumb:hover{background:#2e3a56;background-clip:padding-box}
body{background:radial-gradient(1100px 600px at 85% -10%,rgba(31,199,212,0.14),transparent 60%),radial-gradient(950px 620px at -8% 0%,rgba(118,69,217,0.18),transparent 55%),radial-gradient(800px 520px at 50% 118%,rgba(237,75,158,0.12),transparent 60%),var(--bg);color:var(--txt);font-family:var(--font);padding:16px 16px 60px;min-height:100vh;-webkit-font-smoothing:antialiased}
.tabnum{font-variant-numeric:tabular-nums;font-family:var(--mono)}

/* header */
.topbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#06121f;box-shadow:0 6px 18px rgba(34,211,238,0.35);font-size:15px}
.brand h1{font-size:16px;font-weight:800;letter-spacing:.02em;background:linear-gradient(90deg,#1FC7D4,#ED4B9E);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand p{font-size:10.5px;color:var(--muted);margin-top:1px;letter-spacing:.01em}
.legend{display:flex;flex-wrap:wrap;gap:11px;align-items:center;font-size:10.5px;color:var(--muted);margin-left:auto}
.li{display:flex;align-items:center;gap:5px}.lb{width:10px;height:10px;border-radius:3px}.ll{width:18px;height:2px;border-radius:1px}.ld{width:18px;height:0;border-top:2px dashed}

/* control rows */
.sym-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sym-btn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,0.015);color:var(--muted);cursor:pointer;transition:all .16s}
.sym-btn:hover{border-color:rgba(255,255,255,0.3);color:var(--txt);transform:translateY(-1px)}
.sym-btn.active{background:linear-gradient(180deg,rgba(31,199,212,0.22),rgba(31,199,212,0.08));border-color:rgba(31,199,212,0.6);color:#bcd4ff;box-shadow:0 4px 14px rgba(31,199,212,0.2)}
.tf-select{font-size:11.5px;padding:5px 9px;border-radius:9px;border:1px solid var(--line);background:#0c111c;color:var(--txt);cursor:pointer;font-family:var(--font)}
.sep{width:1px;height:20px;background:var(--line);align-self:center}
.refresh-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
.refresh-btn{font-size:11px;font-weight:600;padding:5px 11px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,0.015);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .16s}
.refresh-btn.on{background:linear-gradient(180deg,rgba(31,199,212,0.2),rgba(31,199,212,0.06));border-color:rgba(31,199,212,0.5);color:#bcd4ff}
.rdot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);animation:pulse 1.4s infinite}.rdot.off{background:#3d4459;box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.countdown{font-size:10px;color:var(--muted);min-width:30px;font-family:var(--mono)}

/* price strip */
.price-bar{display:flex;align-items:center;gap:14px;margin-top:12px;margin-bottom:10px;flex-wrap:wrap;padding:10px 14px;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0));backdrop-filter:blur(6px)}
.sym-lbl{font-size:15px;font-weight:700;letter-spacing:.02em}
.cur-price{font-size:24px;font-weight:800;font-family:var(--mono);transition:color .25s}
.cur-price.flash{animation:flash .5s}
@keyframes flash{0%{filter:brightness(1.7)}100%{filter:brightness(1)}}
.chg-badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:7px;font-family:var(--mono)}
.pos{background:rgba(49,208,170,0.15);color:var(--up)}.neg{background:rgba(237,91,125,0.15);color:var(--dn)}
.ohlcv{display:flex;gap:14px;font-size:11px;color:var(--muted);flex-wrap:wrap;align-items:center;margin-left:auto}
.ohlcv span b{color:#aeb9d4;font-weight:600;font-family:var(--mono)}
.update-bar{font-size:10px;color:var(--muted);margin:-2px 2px 10px;display:none;align-items:center;gap:6px}
.upd-dot{width:6px;height:6px;border-radius:50%;background:var(--up)}

/* toolbars */
.bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0));border:1px solid var(--line);border-radius:var(--r);padding:10px 13px;margin-bottom:9px;backdrop-filter:blur(6px)}
.bar-head{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800}
.bar-head .acc{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 0 8px rgba(31,199,212,0.7)}
.grp{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.grp-label{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-right:1px;font-weight:800}
.divider{width:1px;height:22px;background:var(--line)}
.ind-btn{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,0.012);color:var(--muted);cursor:pointer;transition:all .16s}
.ind-btn:hover{border-color:rgba(255,255,255,0.28);color:#c4cee2;transform:translateY(-1px)}
.ind-btn.active{background:rgba(255,255,255,0.05);color:var(--txt);border-color:rgba(255,255,255,0.22)}
.ind-dot{width:12px;height:3px;border-radius:2px;flex-shrink:0;opacity:.32;transition:all .16s}.ind-btn.active .ind-dot{opacity:1;box-shadow:0 0 7px currentColor}
.mini-sel{font-size:10.5px;padding:4px 7px;border-radius:8px;border:1px solid var(--line);background:#0c111c;color:#aeb9d4;cursor:pointer;font-family:var(--font)}
.actions{display:flex;gap:6px;margin-left:auto;align-items:center}
.mini{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.012);color:var(--muted);cursor:pointer;transition:all .16s}.mini:hover{color:var(--txt);border-color:rgba(255,255,255,0.3)}
.draw-tool{font-size:11px;font-weight:600;padding:5px 11px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,0.012);color:var(--muted);cursor:pointer;transition:all .16s}
#leftBar{position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:8;display:flex;flex-direction:column;gap:5px;padding:6px 5px;background:rgba(12,16,26,0.78);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(7px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
body.light #leftBar{background:rgba(255,255,255,0.85)}
#leftBar .lt-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:8px;border:1px solid transparent;background:transparent;color:#9fb0d0;cursor:pointer;transition:all .14s}
#leftBar .lt-btn:hover{background:rgba(31,199,212,0.12);color:var(--txt)}
#leftBar .lt-btn.active{background:linear-gradient(180deg,rgba(31,199,212,0.25),rgba(31,199,212,0.08));color:#bcd4ff;border-color:rgba(31,199,212,0.55)}
#leftBar.mini .lt-btn:not(.lt-mini){display:none}
#leftBar.mini .lt-sep{display:none}
#leftBar .lt-mini{color:#7fd4dd}
#leftBar .lt-sep{height:1px;background:var(--line);margin:3px 2px}
.draw-tool:hover{color:var(--txt);border-color:rgba(255,255,255,0.28);transform:translateY(-1px)}
.draw-tool.active{background:linear-gradient(180deg,rgba(31,199,212,0.2),rgba(31,199,212,0.06));color:#bcd4ff;border-color:rgba(31,199,212,0.55)}
.swatch{width:19px;height:19px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .14s}.swatch:hover{transform:scale(1.12)}.swatch.active{border-color:#fff;transform:scale(1.14);box-shadow:0 0 8px rgba(255,255,255,0.3)}
.ctrl-btn{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.012);color:var(--muted);cursor:pointer;transition:all .16s}.ctrl-btn:hover{color:var(--txt);border-color:rgba(255,255,255,0.3)}
#indPanel{position:relative;z-index:300;overflow:visible}
#drawBar{position:relative;z-index:200;overflow:visible}
#alertBar{position:relative;z-index:160;overflow:visible}
body.light{--bg:#eceaf4;--bg2:#e1e0ee;--panel:#ffffff;--panel2:#f2f2f9;--line:rgba(28,22,60,0.13);--txt:#1c1733;--muted:#5d5680;--dim:#9189ad}
body.light .panel{background:linear-gradient(180deg,rgba(255,255,255,0.97),rgba(243,243,250,0.98))}
body.light .panel.main-panel{background:linear-gradient(180deg,#ffffff,#f6f6fc)}
body.light .bar,body.light .price-bar{background:linear-gradient(180deg,rgba(20,16,50,0.03),rgba(20,16,50,0))}
body.light .panel-title{color:#5a6485}
body.light .dd-menu{background:rgba(255,255,255,0.95);border-color:rgba(28,22,60,0.14)}
body.light .dd-trigger,body.light .ind-btn,body.light .draw-tool,body.light .mini,body.light .sym-btn{background:rgba(20,16,50,0.02);color:#4a4470}
body.light .tf-select,body.light .mini-sel{background:#f3f3fb;color:#2a2547}
.dd{position:relative;display:inline-block}
.dd-trigger{font-size:11px;font-weight:700;padding:6px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,0.02);color:#c4cee2;cursor:pointer;transition:all .15s}
.dd-trigger:hover{border-color:var(--acc);color:#fff}
.dd.open{z-index:400}
.dd.open .dd-trigger{border-color:var(--acc);color:#fff;background:rgba(31,199,212,0.12)}
.dd-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:400;display:none;flex-direction:column;gap:5px;min-width:184px;max-height:360px;overflow:auto;padding:9px;border:1px solid rgba(255,255,255,0.14);border-radius:14px;background:rgba(24,19,44,0.8);box-shadow:0 18px 50px rgba(0,0,0,0.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.dd.open .dd-menu{display:flex}
.dd-menu .ind-btn{width:100%;justify-content:flex-start}
.dd-menu .grp-label{display:block;color:var(--dim)}
.dd-menu .mini-sel{width:100%;margin-top:2px}
.dd-menu input[type=color]{width:36px;height:24px;border:1px solid var(--line);border-radius:6px;background:none;cursor:pointer;padding:0}
.paneSep{position:absolute;left:0;right:0;height:10px;z-index:8;cursor:row-resize;display:flex;align-items:center;touch-action:none}
.paneGear{position:absolute;left:8px;z-index:14;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:8px;border:1px solid var(--line);background:rgba(12,16,26,0.82);color:#9fb0d0;cursor:pointer;backdrop-filter:blur(6px);transition:all .14s;padding:0}
.paneGear:hover{background:rgba(31,199,212,0.2);color:var(--txt);border-color:rgba(31,199,212,0.55)}
body.light .paneGear{background:rgba(255,255,255,0.88)}
.paneSep::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(120,150,210,0.30),transparent)}
.paneSep .pgrip{margin:0 auto;width:46px;height:5px;border-radius:5px;background:rgba(120,150,210,0.5);box-shadow:0 0 0 1px rgba(255,255,255,0.08);transition:background .15s}
.paneSep:hover .pgrip{background:rgba(140,175,255,0.9)}
.bunny{position:fixed;left:14px;bottom:10px;z-index:998;width:120px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;user-select:none}
.bunny-svg{width:110px;height:130px;overflow:visible;transform-origin:60px 132px;animation:bIdle 3.6s ease-in-out infinite}
.bunny.talk .bunny-svg{animation:bHop .8s ease}
@keyframes bIdle{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(-1.2deg)}}
@keyframes bHop{0%{transform:translateY(0) scale(1,1)}22%{transform:translateY(-18px) scale(1.06,.94)}50%{transform:translateY(0) scale(.98,1.02)}70%{transform:translateY(-7px) scale(1)}100%{transform:translateY(0) scale(1)}}
.bunny .ear{transform-box:fill-box}
.bunny .earL{transform-origin:bottom center;animation:earL 2.9s ease-in-out infinite}
.bunny .earR{transform-origin:bottom center;animation:earR 2.9s ease-in-out infinite}
@keyframes earL{0%,100%{transform:rotate(0)}50%{transform:rotate(-7deg)}}
@keyframes earR{0%,100%{transform:rotate(0)}50%{transform:rotate(7deg)}}
.bunny .arm{transform-box:fill-box;transform-origin:32% 92%}
.bunny.talk .arm{animation:wave .42s ease-in-out 6}
@keyframes wave{0%,100%{transform:rotate(2deg)}50%{transform:rotate(-38deg)}}
.bunny .mouth{transform-box:fill-box;transform-origin:center}
.bunny.talk .mouth{animation:talk .24s ease-in-out 18}
@keyframes talk{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1.25)}}
.bunny .eye{transform-box:fill-box;transform-origin:center;animation:blink 4.4s infinite}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
.bunny-bubble{max-width:240px;opacity:0;transform:translateY(8px) scale(.96);pointer-events:none;transition:opacity .25s,transform .25s;background:rgba(24,19,44,0.92);border:1px solid rgba(255,255,255,0.14);border-left:3px solid var(--acc);color:var(--txt);font-size:12px;font-weight:600;padding:9px 12px;border-radius:14px;border-bottom-left-radius:4px;box-shadow:0 12px 34px rgba(0,0,0,0.5);backdrop-filter:blur(10px)}
.bunny-bubble.show{opacity:1;transform:translateY(0) scale(1)}
.bunny-bubble.bull{border-left-color:var(--up)}
.bunny-bubble.bear{border-left-color:var(--dn)}
.bunny-bubble.neu{border-left-color:var(--acc)}

/* board + panels */
#board{position:relative;width:100%}
.panel{position:absolute;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(20,26,40,0.86),rgba(12,16,26,0.92));border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:0 10px 34px rgba(0,0,0,0.42);backdrop-filter:blur(8px);transition:box-shadow .18s,border-color .18s}
.panel:hover{border-color:rgba(255,255,255,0.14)}
.panel.main-panel{background:linear-gradient(180deg,rgba(17,22,34,0.92),rgba(12,16,26,0.96));overflow:visible}
.panel.main-panel .panel-body{overflow:hidden;border-radius:0 0 var(--r) var(--r)}
#mainHead{position:relative;z-index:50;align-items:center}
#mainHead .dd.open{z-index:400}
#mainHead .ind-btn{width:100%;justify-content:flex-start}
#dd_alerts .dd-menu{right:0;left:auto}
.panel.zbull{border-color:rgba(49,208,170,0.4)}
.panel.zbear{border-color:rgba(237,91,125,0.4)}
.panel.snap{transition:left .2s ease,top .2s ease,width .2s ease,height .2s ease}
#zoneBar{position:absolute;left:0;right:0;top:0;height:20px;z-index:6;pointer-events:none;display:flex;align-items:center;justify-content:center;font:800 10px var(--font);letter-spacing:.18em;color:#08121f;background:transparent;transition:background .35s,color .35s;border-top-left-radius:var(--r);border-top-right-radius:var(--r)}
.panel-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 11px;border-bottom:1px solid var(--line);cursor:move;user-select:none;touch-action:none;background:linear-gradient(180deg,rgba(255,255,255,0.035),transparent)}
.panel-head .grip{color:#33405e;font-size:12px;letter-spacing:-2px;cursor:move}
.panel-title{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:#8ea0c2;text-transform:uppercase}
.panel-head .hint{font-size:9px;color:#39455f;text-transform:none;letter-spacing:0}
.panel-head .right{display:flex;align-items:center;gap:5px;margin-left:auto}
.head-toggle{margin-left:6px}
.panel.head-min .panel-head{padding-top:3px;padding-bottom:3px}
.panel.head-min .panel-head .panel-title,.panel.head-min .panel-head .hint,.panel.head-min .panel-head .right{display:none}
.panel.head-min .head-toggle{margin-left:auto}
.pane-rsi{font-size:12px;font-weight:700;font-family:var(--mono)}
.badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.05em}
.bull-badge{background:rgba(49,208,170,0.14);color:var(--up);border:1px solid rgba(49,208,170,0.32)}
.bear-badge{background:rgba(237,91,125,0.14);color:var(--dn);border:1px solid rgba(237,91,125,0.32)}
.neu-badge{background:rgba(255,255,255,0.04);color:#41506e;border:1px solid var(--line)}
.panel-body{position:relative;flex:1;min-height:0;min-width:0;padding:4px 6px}
.panel-body.flush{padding:0}
.panel-body canvas{display:block;width:100%;height:100%}
#priceWrap{position:relative;flex:1;min-height:0;height:100%}
#mainChartDiv{position:absolute;inset:0}
#drawCanvas{position:absolute;inset:0;z-index:5;pointer-events:none;touch-action:none}
#macdTag{position:absolute;left:10px;bottom:8px;z-index:6;display:none;align-items:center;gap:9px;padding:3px 9px;border-radius:8px;background:rgba(8,11,18,0.78);border:1px solid var(--line);font-size:10px;color:var(--muted);backdrop-filter:blur(4px)}
#macdTag b{color:#aeb9d4;font-weight:700;font-family:var(--mono)}
#macdTag .x{cursor:pointer;color:#3d4a62;font-size:11px}#macdTag .x:hover{color:var(--dn)}
#bandSep{position:absolute;left:0;right:0;height:12px;margin-top:-6px;z-index:7;cursor:row-resize;display:none;align-items:center;touch-action:none}
#bandSep::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(120,150,210,0.35),transparent)}
#bandSep .grip{margin:0 auto;width:50px;height:6px;border-radius:6px;background:rgba(120,150,210,0.45);box-shadow:0 0 0 1px rgba(255,255,255,0.08);transition:background .15s}
#bandSep:hover .grip{background:rgba(140,175,255,0.85)}
#bandSep .lbl{position:absolute;left:7px;top:-2px;font:700 9px var(--mono);color:rgba(174,185,212,0.75);letter-spacing:.05em}
.resize-handle{position:absolute;right:0;bottom:0;width:20px;height:20px;cursor:nwse-resize;z-index:20;touch-action:none}
.resize-handle::after{content:'';position:absolute;right:3px;bottom:3px;width:10px;height:10px;border-right:2px solid rgba(255,255,255,0.32);border-bottom:2px solid rgba(255,255,255,0.32);border-radius:0 0 3px 0}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(8,11,18,0.93);z-index:10}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.overlay p{font-size:10.5px;color:var(--muted)}
footer{margin-top:18px;text-align:center;font-size:9.5px;color:#222a3c}
.toast{position:fixed;right:16px;bottom:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast div{background:rgba(14,19,32,0.96);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideIn .25s}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="board">
  <div class="panel main-panel" id="panel_main">
    <div class="panel-head" id="mainHead">
      <span class="grip">⋮⋮</span>
      <div class="brand">
        <h1>PULSE</h1>
      </div>
      <span style="margin-left: auto; font-size: 10px; color: var(--muted);">Crypto MTF Dashboard</span>
    </div>
    <div class="panel-body flush" data-panel="main">
      <div id="priceWrap">
        <div id="mainChartDiv" style="width: 100%; height: 100%;"></div>
        <div class="overlay" id="mainOverlay"><div class="spinner"></div><p>Loading dashboard…</p></div>
      </div>
    </div>
  </div>
</div>

<div class="price-bar">
  <span class="sym-lbl" id="symLbl">BTCUSDT</span>
  <span class="cur-price" id="curPrice">—</span>
  <span class="chg-badge pos" id="chgBadge">—</span>
  <div class="ohlcv"><span>Status: <b id="statusText">Loading…</b></span></div>
</div>

<div class="toast" id="toast"></div>

<footer>
<p>PULSE · Crypto Multi-Timeframe Dashboard | Real-time data from Binance API</p>
</footer>

<script>
// Core dashboard initialization
document.addEventListener('DOMContentLoaded', function() {
  console.log('PULSE Dashboard loaded');
  document.getElementById('statusText').textContent = 'Ready';
});
</script>
</body>
</html>
